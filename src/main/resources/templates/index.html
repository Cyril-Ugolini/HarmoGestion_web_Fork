<!DOCTYPE html>
<html lang="Fr-fr" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="fragments/head :: head">
    <title th:text="${titrePage}">HarmoGestion : Accueil</title>
  </head>
  <body>
    <header th:replace="fragments/header :: header"></header>
    <main class="container">
      <h1 th:text="#{titre.accueil}">Accueil</h1>
      <h2>Liste des membres</h2>
      <table>
        <thead>
        <tr>
          <th>Nom</th>
          <th>Prénom</th>
          <th>Date d'inscription</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(listeMembres)}">
          <td colspan="3" th:text="#{donnee.absente}"></td>
        </tr>
        <tr th:each="membre : ${listeMembres}">
          <td th:text="${membre?.nomMembre}">Nom</td>
          <td th:text="${membre?.prenomMembre}">Prénom</td>
          <td th:text="${membre?.dateInscriptionMembre}">Date</td>
        </tr>
        </tbody>
      </table>
      <br>
      <h2><a th:href="@{/autrePageTest}">Aller à l'autre page</a></h2>
    </main>
    <footer th:replace="fragments/footer :: footer"></footer>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
  </body>
</html>
