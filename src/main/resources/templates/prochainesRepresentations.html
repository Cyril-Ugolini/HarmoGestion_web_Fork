<!DOCTYPE html>
<html lang="Fr-fr" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="fragments/head :: head">
    <title th:text="${titrePage}">HarmoGestion : Prochaines représentations</title>
  </head>

  <body>
    <header th:replace="fragments/header :: header"></header>
    <main class="container">
      <h1 th:text="#{titre.titrePrerempli}">Titre</h1>
    </main>
    <footer th:replace="fragments/footer :: footer"></footer>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>

    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">Prochaines représentations</h1>

        <!-- BOUTON POUR ALLER AU FORMULAIRE -->
        <a th:href="@{/planifierRepresentation}" class="btn btn-primary">
          Planifier une représentation
        </a>
      </div>

      <!-- Tableau des représentations -->
      <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Nom</th>
          <th>Date</th>
          <th>Lieu</th>
          <th>Participants</th>
          <th>Instruments</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="rep : ${representations}">
          <td th:text="${rep.idRepresentation}"></td>
          <td th:text="${rep.nomRepresentation}"></td>
          <td th:text="${rep.dateRepresentation}"></td>
          <td th:text="${rep.lieuRepresentation}"></td>

          <!-- Participants : prénom + nom -->
          <td th:text="${#strings.listJoin(rep.participants.^[prenom + ' ' + nom], ', ')}"></td>

          <!-- Instruments : libellé -->
          <td th:text="${#strings.listJoin(rep.instruments.^[libelleInstrument], ', ')}"></td>
        </tr>
        </tbody>
      </table>

    </div>

    <div th:replace="fragments/footer :: footer"></div>
  </body>
</html>
