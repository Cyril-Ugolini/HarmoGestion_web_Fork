<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="../static/node_modules/bootstrap/dist/css/bootstrap.min.css"
          th:href="@{/node_modules/bootstrap/dist/css/bootstrap.min.css}">

    <link rel="stylesheet"
          href="../static/style.css"
          th:href="@{/style.css}">

    <title>Prochaines représentations</title>
  </head>

  <body>

    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">Prochaines représentations</h1>

        <!-- BOUTON POUR ALLER AU FORMULAIRE -->
        <a th:href="@{/planifierRepresentation}" class="btn btn-primary">
          Planifier une représentation
        </a>
      </div>

      <!-- Tableau des représentations -->
      <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Nom</th>
          <th>Date</th>
          <th>Lieu</th>
          <th>Participants</th>
          <th>Instruments</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="rep : ${representations}">
          <td th:text="${rep.idRepresentation}"></td>
          <td th:text="${rep.nomRepresentation}"></td>
          <td th:text="${rep.dateRepresentation}"></td>
          <td th:text="${rep.lieuRepresentation}"></td>

          <!-- Participants : prénom + nom -->
          <td th:text="${#strings.listJoin(rep.participants.^[prenom + ' ' + nom], ', ')}"></td>

          <!-- Instruments : libellé -->
          <td th:text="${#strings.listJoin(rep.instruments.^[libelleInstrument], ', ')}"></td>
        </tr>
        </tbody>
      </table>

    </div>

    <div th:replace="fragments/footer :: footer"></div>

  </body>
</html>
