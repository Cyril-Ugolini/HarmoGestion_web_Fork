<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title>Représentation</title>
    <link rel="stylesheet" href="/css/style.css">
  </head>

  <body>
    <header>
      <h1>HarmoGestion</h1>
      <p>Gestion association de musique</p>
    </header>

    <main>
      <h2>5ème Symphonie</h2>
      <h3>Salle des fêtes de Liverdun</h3>

      <p>
        <strong>Date :</strong>
        12 avril 2025
      </p>

      <h4>Instruments</h4>
      <ul>
        <li th:each="i : ${instruments}" th:text="${i}"></li>
      </ul>

      <h4>Membres</h4>
      <ul>
        <li th:each="m : ${membres}" th:text="${m}"></li>
      </ul>
    </main>

    <footer>
      <p>HarmoGestion — Mentions légales — Accessibilité : Partiellement conforme</p>
    </footer>
  </body>
</html>
